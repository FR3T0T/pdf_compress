<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Same policy as web/index.html (minus frame-ancestors, which is
         ignored in a <meta> CSP and just triggers a console warning there —
         it has no effect outside an HTTP response header) — defense-in-
         depth on top of the QWebEngineUrlRequestInterceptor
         (ui/net_guard.py), which is the hard guarantee. -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self' qrc: data: blob:;
                   script-src 'self' qrc:;
                   style-src 'self' 'unsafe-inline';
                   img-src 'self' data: blob:;
                   font-src 'self' data:;
                   connect-src 'none';
                   object-src 'none';
                   base-uri 'none';
                   form-action 'self';">
    <title>PDF Toolkit (React)</title>
    <script defer src="./assets/index-B0r7I0WM.js"></script>
    <link rel="stylesheet" href="./assets/style-DWqinV7y.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- QWebChannel bridge (built-in Qt resource, same as web/index.html).
         Classic script, so it runs before the deferred module below. In a
         plain browser (vite dev / no Qt host) this 404s harmlessly and
         window.QWebChannel stays undefined — qwebchannel-connect.ts falls
         back to mock mode. -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  </body>
</html>
