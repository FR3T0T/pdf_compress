name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.6"
      - name: ruff check
        run: ruff check --output-format=github .

  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        # requirements.txt pulls the full runtime (incl. numpy + python-docx,
        # which several tests exercise). The unit suite itself is pure-Python
        # and imports no Qt -- the compress path helper lives in the Qt-free
        # compress_paths.py precisely so tests/test_bridge.py can run headless.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Install Qt runtime libraries (Linux)
        # Not needed by the current pure-Python suite, but installed so future
        # integration tests can `import PySide6` / construct the Bridge or a
        # QApplication on the headless Ubuntu runner. Qt's shared libraries
        # dlopen these at import time (e.g. libEGL.so.1), which the slim runner
        # image doesn't ship. No-op on Windows (Qt bundles its own DLLs).
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Run tests
        # QT_QPA_PLATFORM=offscreen lets any Qt objects a future test builds
        # run without a display server. Harmless for the current suite, which
        # never constructs a QApplication.
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q --cov=. --cov-report=term-missing
